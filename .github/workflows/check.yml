name: Check
on: [workflow_dispatch]
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/cas-development-site/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('result',[]):
              print(r['name'],'→',r.get('status','?'))
          " | tee check.txt
          # Also test HTTP response
          echo '---'
          curl -o /dev/null -sw "cas-develop.com HTTP: %{http_code}\n" https://cas-develop.com/ || true
          git config user.email "b@b" && git config user.name "b"
          git add check.txt && git commit -m "check" && git push || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
