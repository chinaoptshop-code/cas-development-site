name: 🚀 Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:   # дозволяє запускати вручну

jobs:
  deploy:
    name: Deploy to 192.168.31.212
    runs-on: self-hosted   # запускається на твоєму сервері

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📁 Deploy files to webroot
        run: |
          WEBROOT="${{ vars.WEBROOT || '/var/www/html' }}"
          echo "Deploying to: $WEBROOT"
          
          # Copy all site files
          cp -v index.html services.html portfolio.html about.html contact.html "$WEBROOT/"
          cp -v sitemap.xml robots.txt "$WEBROOT/"
          
          echo "✅ Deploy complete!"
          echo "Files in $WEBROOT:"
          ls -lh "$WEBROOT/"*.html

      - name: 🔄 Reload nginx
        run: sudo nginx -s reload || true
