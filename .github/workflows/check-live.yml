name: Check Live
on: [workflow_dispatch]
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          {
            echo "=== cas-develop.com ==="
            curl -sI https://cas-develop.com 2>&1 | head -5
            echo "=== /services.html ==="
            curl -sI https://cas-develop.com/services.html 2>&1 | head -3
            echo "=== /portfolio.html ==="
            curl -sI https://cas-develop.com/portfolio.html 2>&1 | head -3
          } | tee live.txt
          git config user.email "b@b" && git config user.name "b"
          git add live.txt && git commit -m "live check" && git push
