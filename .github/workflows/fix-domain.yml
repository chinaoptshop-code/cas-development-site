name: Fix Domain
on: [workflow_dispatch]
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove wrong domain + add correct one
        run: |
          BASE="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/cas-development-site"
          AUTH="Authorization: Bearer $CLOUDFLARE_API_TOKEN"

          echo "=== Removing cas-development.com ==="
          curl -s -X DELETE "$BASE/domains/cas-development.com" -H "$AUTH" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Removed:', d.get('success'))"

          echo "=== Adding cas-develop.com ==="
          RESULT=$(curl -s -X POST "$BASE/domains" \
            -H "$AUTH" -H "Content-Type: application/json" \
            --data '{"name":"cas-develop.com"}')
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('success'):
              r=d['result']
              print('✅ Added:', r.get('name'), '→ status:', r.get('status','pending'))
          else:
              print('❌', d.get('errors'))
          " | tee result.txt
          git config user.email "bot@cas" && git config user.name "Bot"
          git add result.txt && git commit -m "domain result" && git push || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
