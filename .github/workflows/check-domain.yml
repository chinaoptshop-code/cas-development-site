name: Check Domain Status
on: [workflow_dispatch]
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check and save result
        run: |
          RESULT=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/cas-development-site/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for dom in d.get('result',[]):
              print(dom['name'], '→', dom.get('status','?'), dom.get('verification_status','?'))
          " > domain-status.txt
          cat domain-status.txt
          git config user.email "bot@cas"
          git config user.name "Bot"
          git add domain-status.txt
          git commit -m "status check" && git push || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
