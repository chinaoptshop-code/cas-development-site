name: Check Domain Status
on: [workflow_dispatch]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/cas-development-site/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for dom in d.get('result',[]):
              print(f'{dom[\"name\"]} → {dom.get(\"verification_status\",\"?\")} / {dom.get(\"status\",\"?\")}')
          "
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
