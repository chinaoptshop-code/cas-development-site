name: Diagnose
on: [workflow_dispatch]
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check
        run: |
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          ACCOUNT="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

          # Zone ID
          ZONE=$(curl -sf "https://api.cloudflare.com/client/v4/zones?name=cas-develop.com" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.result[0].id')
          echo "Zone: $ZONE"

          echo "=DNS=" > diag.txt
          curl -sf "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records" \
            -H "Authorization: Bearer $TOKEN" \
            | jq -r '.result[] | [.type, .name, .content, (.proxied|tostring)] | join(" ")' >> diag.txt

          echo "=WORKERS=" >> diag.txt
          curl -sf "https://api.cloudflare.com/client/v4/zones/$ZONE/workers/routes" \
            -H "Authorization: Bearer $TOKEN" \
            | jq -r '.result[]? | [.pattern, .script] | join(" -> ")' >> diag.txt

          echo "=ACCESS=" >> diag.txt
          curl -sf "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/access/apps" \
            -H "Authorization: Bearer $TOKEN" \
            | jq -r '.result[]? | [.name, .domain] | join(" | ")' >> diag.txt

          echo "=HTTP=" >> diag.txt
          curl -sI https://cas-develop.com 2>&1 | head -6 >> diag.txt

          cat diag.txt

          git config user.email "b@b" && git config user.name "b"
          git add diag.txt && git commit -m "diag" && git push

      - uses: actions/setup-python@v4
        if: failure()
        with:
          python-version: '3.x'
