name: Diagnose
on: [workflow_dispatch]
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          BASE="https://api.cloudflare.com/client/v4"
          HDR="Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          ZONE_ID=$(curl -s "$BASE/zones?name=cas-develop.com" -H "$HDR" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")

          echo "ZONE_ID=$ZONE_ID"

          echo "--- DNS ---"
          curl -s "$BASE/zones/$ZONE_ID/dns_records" -H "$HDR" \
            | python3 -c "
          import sys,json
          for r in json.load(sys.stdin)['result']:
              print(f\"{r['type']:6} {r['name']:30} {r['content']} proxy={r.get('proxied')}\")
          "
          echo "--- WORKERS ROUTES ---"
          curl -s "$BASE/zones/$ZONE_ID/workers/routes" -H "$HDR" \
            | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('result',[]):
              print(r['pattern'],'->', r.get('script','(no script)'))
          if not d.get('result'):
              print('none')
          "
          echo "--- HTTP RESPONSE ---"
          curl -sI https://cas-develop.com 2>&1 | grep -E "^HTTP|^cf-ray|^server|^location|^x-"

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        id: diag

      - name: Save
        if: always()
        run: |
          BASE="https://api.cloudflare.com/client/v4"
          HDR="Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          ZONE_ID=$(curl -s "$BASE/zones?name=cas-develop.com" -H "$HDR" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")
          {
            curl -s "$BASE/zones/$ZONE_ID/dns_records" -H "$HDR" \
              | python3 -c "import sys,json; [print(r['type'],r['name'],r['content'],r.get('proxied')) for r in json.load(sys.stdin)['result']]"
            echo "=WORKERS="
            curl -s "$BASE/zones/$ZONE_ID/workers/routes" -H "$HDR" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); [print(r['pattern'],r.get('script')) for r in d.get('result',[])] or print('none')"
            echo "=HTTP="
            curl -sI https://cas-develop.com 2>&1 | head -8
          } > diag.txt
          cat diag.txt
          git config user.email "b@b" && git config user.name "b"
          git add diag.txt && git commit -m "diag" && git push
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
