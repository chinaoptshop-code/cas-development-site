name: Diagnose
on: [workflow_dispatch]
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tunnels and pages
        run: |
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          ACCOUNT="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          BASE="https://api.cloudflare.com/client/v4"

          {
            echo "=== TUNNELS ==="
            curl -sf "$BASE/accounts/$ACCOUNT/cfd_tunnel" \
              -H "Authorization: Bearer $TOKEN" \
              | jq -r '.result[]? | "\(.name) | \(.status) | id:\(.id)"'

            echo "=== PAGES DOMAINS ==="
            curl -sf "$BASE/accounts/$ACCOUNT/pages/projects/cas-development-site/domains" \
              -H "Authorization: Bearer $TOKEN" \
              | jq -r '.result[]? | "\(.name) | status:\(.status) | verify:\(.verification_status)"'

            echo "=== PAGES PROJECT ==="
            curl -sf "$BASE/accounts/$ACCOUNT/pages/projects/cas-development-site" \
              -H "Authorization: Bearer $TOKEN" \
              | jq -r '"\(.result.name) | subdomain:\(.result.subdomain) | latest:\(.result.latest_deployment.url // "none")"'

            echo "=== ZONES ==="
            curl -sf "$BASE/zones" \
              -H "Authorization: Bearer $TOKEN" \
              | jq -r '.result[]? | "\(.name) | \(.id)"'

          } | tee diag.txt

          git config user.email "b@b" && git config user.name "b"
          git add diag.txt && git commit -m "diag" && git push
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
