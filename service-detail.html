<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080709;--bg2:#0f0e11;--sf:#181620;--tx:#EDE8DF;--mu:#7a7470;--ac:#BF9148;--bd:rgba(237,232,223,.1);--D:'Cormorant Garamond',serif;--M:'Plus Jakarta Sans',sans-serif}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--M);font-weight:300;line-height:1.72;overflow-x:hidden}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:22px 52px;background:rgba(8,7,9,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd)}
.nav-logo{font-family:var(--M);font-size:.75rem;letter-spacing:.28em;text-transform:uppercase;color:var(--tx);text-decoration:none}
.nav-back{font-family:var(--M);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .2s}
.nav-back:hover{color:var(--ac)}
.nav-back::before{content:'←'}
.nav-right{display:flex;align-items:center;gap:24px}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-family:var(--M);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);text-decoration:none;position:relative;transition:color .2s;padding-bottom:2px}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--ac);transition:width .3s}
.nav-links a:hover,.nav-links a.on{color:var(--tx)}
.nav-links a:hover::after,.nav-links a.on::after{width:100%}

/* ── SERVICE TABS ── */
.service-tabs{position:sticky;top:65px;z-index:900;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none}
.service-tabs::-webkit-scrollbar{display:none}
.stab{font-family:var(--M);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;padding:14px 22px;color:var(--mu);cursor:pointer;border:none;background:none;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;text-decoration:none}
.stab:hover{color:var(--tx)}
.stab.on{color:var(--ac);border-bottom-color:var(--ac)}

/* ── HERO ── */
.sd-hero{min-height:340px;display:flex;align-items:flex-end;padding:100px 52px 52px;position:relative;overflow:hidden}
.sd-hero-bg{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:.22;filter:saturate(.6)}
.sd-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,transparent 60%)}
.sd-hero-in{position:relative;z-index:2}
.sd-tag{font-family:var(--M);font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--ac);margin-bottom:12px;display:block}
.sd-title{font-family:var(--D);font-size:clamp(2.4rem,5vw,4rem);font-weight:300;line-height:1.05;margin-bottom:16px}
.sd-price-hero{font-family:var(--M);font-size:1rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ac);font-weight:500}

/* ── SECTIONS ── */
.sd-body{padding:0 52px 80px}
.sd-section{padding:60px 0;border-bottom:1px solid var(--bd)}
.sd-section:last-child{border-bottom:none}
.sd-h2{font-family:var(--D);font-size:2rem;font-weight:300;margin-bottom:32px;color:var(--tx)}
.sd-h2 em{color:var(--ac);font-style:italic}

/* ── STAGES ── */
.stages{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0}
.stage{padding:32px 28px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);position:relative}
.stage:nth-child(3n){border-right:none}
.stage-num{font-family:var(--D);font-size:3.5rem;font-weight:300;color:rgba(191,145,72,.12);line-height:1;margin-bottom:8px}
.stage-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);margin-bottom:14px}
.stage-name{font-family:var(--M);font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--tx);margin-bottom:8px;font-weight:500}
.stage-time{font-family:var(--M);font-size:.68rem;color:var(--ac);margin-bottom:10px;letter-spacing:.06em}
.stage-desc{font-family:var(--M);font-size:.78rem;color:var(--mu);line-height:1.7}

/* ── INCLUDED / EXCLUDED ── */
.inc-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.inc-col{padding:32px 0}
.inc-col:first-child{padding-right:40px;border-right:1px solid var(--bd)}
.inc-col:last-child{padding-left:40px}
.inc-head{font-family:var(--M);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mu);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.inc-head::after{content:'';flex:1;height:1px;background:var(--bd)}
.inc-list{display:flex;flex-direction:column;gap:10px}
.inc-item{font-family:var(--M);font-size:.8rem;color:var(--mu);display:flex;gap:10px;align-items:flex-start;line-height:1.6}
.inc-item.yes::before{content:'✓';color:var(--ac);flex-shrink:0;font-weight:600}
.inc-item.no::before{content:'○';color:rgba(237,232,223,.25);flex-shrink:0}
.inc-item.no{color:rgba(237,232,223,.35)}
.inc-note{font-family:var(--M);font-size:.72rem;color:var(--ac);margin-top:16px;font-style:italic}

/* ── PORTFOLIO GALLERY ── */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.gal-item{aspect-ratio:4/3;overflow:hidden;cursor:pointer;position:relative}
.gal-item img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease,filter .4s;filter:saturate(.7) brightness(.85)}
.gal-item:hover img{transform:scale(1.05);filter:saturate(1) brightness(.95)}
.gal-item:first-child{grid-column:span 2;aspect-ratio:16/9}
.gal-label{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);font-family:var(--M);font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(237,232,223,.8);opacity:0;transition:opacity .3s}
.gal-item:hover .gal-label{opacity:1}

/* ── TAGS ── */
.tag-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px}
.tag{font-family:var(--M);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;padding:7px 14px;border:1px solid rgba(191,145,72,.28);color:var(--ac)}

/* ── CTA ── */
.sd-cta{background:var(--bg2);padding:60px 52px;text-align:center;margin:0 -52px}
.sd-cta-t{font-family:var(--D);font-size:2.2rem;font-weight:300;margin-bottom:8px}
.sd-cta-s{font-family:var(--M);font-size:.8rem;color:var(--mu);margin-bottom:32px}
.btn-ac{display:inline-flex;align-items:center;gap:10px;padding:16px 40px;border:1px solid var(--ac);font-family:var(--M);font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ac);text-decoration:none;transition:background .25s,color .25s}
.btn-ac:hover{background:var(--ac);color:#000}

/* ── LIGHTBOX ── */
#sdlb{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.93);align-items:center;justify-content:center}
#sdlb.open{display:flex}
#sdlb img{max-width:90vw;max-height:88vh;object-fit:contain}
#sdlb-close{position:absolute;top:24px;right:32px;font-size:1.5rem;color:var(--mu);cursor:pointer;background:none;border:none;transition:color .2s}
#sdlb-close:hover{color:var(--tx)}

/* ── MOBILE ── */
@media(max-width:767px){
  nav{padding:16px 20px}
  .nav-links{display:none}
  .sd-hero{padding:80px 20px 40px;min-height:260px}
  .sd-body{padding:0 20px 60px}
  .stages{grid-template-columns:1fr}
  .stage{border-right:none}
  .inc-grid{grid-template-columns:1fr;gap:32px}
  .inc-col:first-child{padding-right:0;border-right:none;padding-bottom:24px;border-bottom:1px solid var(--bd)}
  .inc-col:last-child{padding-left:0}
  .gallery-grid{grid-template-columns:1fr 1fr}
  .gal-item:first-child{grid-column:span 2}
  .sd-cta{padding:48px 20px;margin:0 -20px}
  .service-tabs{top:56px}
}
</style>

function renderService(slug){
  const s = SERVICES[slug];
  if(!s) return;
  document.title = 'CAS Development — ' + s.title.replace('\n',' ');

  // Update tabs
  document.querySelectorAll('.stab').forEach(t=>{
    t.classList.toggle('on', t.dataset.slug===slug);
  });

  const stagesHTML = s.stages.map(st=>`
    <div class="stage">
      <div class="stage-num">${st.n}</div>
      <div class="stage-dot"></div>
      <div class="stage-name">${st.name}</div>
      <div class="stage-time">${st.time}</div>
      <div class="stage-desc">${st.desc}</div>
    </div>`).join('');

  const inclHTML = s.included.map(i=>`<div class="inc-item yes">${i}</div>`).join('');
  const exclHTML = s.excluded.map(e=>`<div class="inc-item no">${e}</div>`).join('');

  const galleryHTML = s.gallery.map((g,i)=>`
    <div class="gal-item" onclick="lbOpen('${BASE}${g.id}&sz=w1600')">
      <img src="${BASE}${g.id}&sz=w600" loading="${i<6?'eager':'lazy'}" alt="${g.label}">
      <div class="gal-label">${g.label}</div>
    </div>`).join('');

  const tagsHTML = s.tags.map(t=>`<span class="tag">${t}</span>`).join('');

  document.getElementById('sd-content').innerHTML = `
    <div class="sd-hero">
      <img class="sd-hero-bg" src="${BASE}${s.bg}&sz=w1400" loading="eager" alt="">
      <div class="sd-hero-grad"></div>
      <div class="sd-hero-in">
        <span class="sd-tag">${s.tag}</span>
        <h1 class="sd-title">${s.title.replace('\n','<br>')}</h1>
        <div class="sd-price-hero">${s.price}</div>
      </div>
    </div>

    <div class="sd-body">
      <div class="sd-section">
        <p style="font-family:var(--M);font-size:.92rem;line-height:1.9;color:var(--mu);max-width:680px">${s.desc}</p>
        <div class="tag-row">${tagsHTML}</div>
      </div>

      <div class="sd-section">
        <h2 class="sd-h2">Етапи <em>роботи</em></h2>
        <div class="stages">${stagesHTML}</div>
      </div>

      <div class="sd-section">
        <h2 class="sd-h2">Що <em>входить</em></h2>
        <div class="inc-grid">
          <div class="inc-col">
            <div class="inc-head">Включено</div>
            <div class="inc-list">${inclHTML}</div>
          </div>
          <div class="inc-col">
            <div class="inc-head">Не включено</div>
            <div class="inc-list">${exclHTML}</div>
            <p class="inc-note">* Позначені позиції можна додати як опцію</p>
          </div>
        </div>
      </div>

      <div class="sd-section">
        <h2 class="sd-h2">Наші <em>роботи</em></h2>
        <div class="gallery-grid">${galleryHTML}</div>
      </div>

      <div class="sd-cta">
        <div class="sd-cta-t">Готові розпочати?</div>
        <p class="sd-cta-s">Безкоштовна консультація — визначимо обсяг, строки та бюджет</p>
        <a href="contact.html" class="btn-ac">Обговорити проєкт →</a>
      </div>
    </div>`;
}

function lbOpen(src){
  document.getElementById('sdlb-img').src=src;
  document.getElementById('sdlb').classList.add('open');
  document.body.style.overflow='hidden';
}
document.getElementById('sdlb').addEventListener('click',function(e){
  if(e.target===this){this.classList.remove('open');document.body.style.overflow='';}
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){document.getElementById('sdlb').classList.remove('open');document.body.style.overflow='';}
});

// Tab click navigation
document.querySelectorAll('.stab').forEach(t=>{
  t.addEventListener('click',function(e){
    e.preventDefault();
    const slug=this.dataset.slug;
    history.replaceState(null,'','#'+slug);
    renderService(slug);
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

// Init from hash
const initSlug = (location.hash.replace('#','')) || 'design';
renderService(SERVICES[initSlug] ? initSlug : 'design');
</script>
